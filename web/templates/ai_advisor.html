<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor - RentBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">RentBot Admin</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Статистика</a>
                <a class="nav-link" href="/listings">Объявления</a>
                <a class="nav-link" href="/feedback">Обратная связь</a>
                <a class="nav-link active" href="/ai-insights">AI Advisor</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h1 class="h2">🤖 AI Growth Advisor</h1>
                <p class="text-muted">Интеллектуальный анализ метрик и ежедневные идеи по развитию бота.</p>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for rec in recommendations %}
            <div class="col">
                <div class="card h-100 border-primary shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <small class="text-uppercase fw-bold">{{ rec.agent }}</small>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ rec.title }}</h5>
                        <p class="card-text">{{ rec.content }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявки - RentBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            background: rgba(255,255,255,0.05);
            color: var(--primary);
        }
        .status-new { color: #facc15; }
        .status-processed { color: #4ade80; }
        .nav a {
            color: var(--text);
            text-decoration: none;
            margin-right: 20px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">⬅️ Назад на дашборд</a>
    </div>
    <h1>📝 Заявки на обучение</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя ребенка</th>
                <th>Возраст</th>
                <th>Телефон</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
            {% for app in applications %}
            <tr>
                <td>{{ app.id }}</td>
                <td>{{ app.child_name }}</td>
                <td>{{ app.age }}</td>
                <td>{{ app.phone }}</td>
                <td class="status-{{ app.status }}">{{ app.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

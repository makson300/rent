<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Rent | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050b18;
            --accent: #00f2fe;
            --accent-pink: #ec4899;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #050b18 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Particles effect background */
        body::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, transparent 60%);
            top: -200px;
            left: -200px;
            animation: pulse 10s infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            bottom: -100px;
            right: -100px;
            animation: pulse-pink 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        @keyframes pulse-pink {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .glass-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-family: 'Outfit';
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .glass-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .glass-btn {
            width: 100%;
            background: linear-gradient(to right, var(--accent), #00d2ff);
            color: #050b18;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .glass-btn:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">SKY RENT AI</div>
        <p class="subtitle">Admin Dashboard Authorization</p>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="password">ACCESS TOKEN</label>
                <input type="password" name="password" id="password" class="glass-input" required placeholder="Введите пароль...">
            </div>
            
            <button type="submit" class="glass-btn">Подключиться</button>
        </form>
    </div>
</body>
</html>
